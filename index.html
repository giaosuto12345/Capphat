<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wedding Guest App Minimal Pro</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#fff1f2', 100: '#ffe4e6', 200: '#fecdd3', 400: '#fb7185', 500: '#f43f5e', 600: '#e11d48', 800: '#9f1239', 900: '#881337' }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0,0,0,0.05)',
                        'float': '0 20px 40px -10px rgba(225,29,72,0.3)',
                    }
                }
            }
        }
    </script>
    
    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #f8fafc; overscroll-behavior-y: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .pb-safe { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
        .pt-safe { padding-top: max(1rem, env(safe-area-inset-top)); }
        .content-pb { padding-bottom: calc(90px + env(safe-area-inset-bottom)); }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-top: 1px solid rgba(226, 232, 240, 0.8); }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- ICONS ---
        const IconHome = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconUsers = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconSettings = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
        const IconPlus = () => <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconMic = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>;
        const IconMicOff = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="2" y1="2" x2="22" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" y1="19" x2="12" y2="22"/></svg>;
        const IconX = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
        const IconSearch = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconChevron = ({ className }) => <svg className={className} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>;
        const IconEnvelope = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
        const IconRefresh = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const IconExcel = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></svg>;
        const IconDownload = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const IconUpload = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;

        const capitalizeWords = (str) => {
            if (!str) return '';
            return str.replace(/(?:^|\s)\S/g, function(a) { return a.toUpperCase(); });
        };

        function App() {
            // --- STATES ---
            const [activeTab, setActiveTab] = useState('list');
            const [guests, setGuests] = useState(() => {
                try {
                    const saved = localStorage.getItem('wedding_app_final');
                    return saved ? JSON.parse(saved) : [];
                } catch { return []; }
            });
            const [toast, setToast] = useState(null);
            
            // Modal Thêm Khách
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [inputGroup, setInputGroup] = useState('');
            const [newGroupInput, setNewGroupInput] = useState('');
            const [inputNames, setInputNames] = useState(''); 
            const [defaultMainMeals, setDefaultMainMeals] = useState(1);
            const [defaultSubMeals, setDefaultSubMeals] = useState(0);
            
            // Mic
            const [isListening, setIsListening] = useState(false);
            const recognitionRef = useRef(null);
            const inputRef = useRef(null);

            // TÌM KIẾM, LỌC & SẮP XẾP (ĐÃ KHÔI PHỤC ĐẦY ĐỦ)
            const [searchTerm, setSearchTerm] = useState('');
            const [filterGroup, setFilterGroup] = useState('all');
            const [sortBy, setSortBy] = useState('time_desc');

            // Accordion (Đóng mở nhóm)
            const [collapsedGroups, setCollapsedGroups] = useState({}); 
            const [expandedGuestId, setExpandedGuestId] = useState(null); 

            useEffect(() => {
                localStorage.setItem('wedding_app_final', JSON.stringify(guests));
            }, [guests]);

            const showToast = (message, type = 'success') => {
                setToast({ message, type, id: Date.now() });
                setTimeout(() => setToast(null), 2000); 
            };

            const uniqueGroups = useMemo(() => Array.from(new Set(guests.map(g => g.group))).sort(), [guests]);

            // --- GIỌNG NÓI ---
            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    const recognition = new SpeechRecognition();
                    recognition.continuous = true;
                    recognition.lang = 'vi-VN';
                    recognition.onresult = (event) => {
                        const transcript = Array.from(event.results).map(r => r[0].transcript).join(', ');
                        const clean = transcript.split(',').map(s => s.trim()).filter(s => s).join(', ');
                        const capitalizedClean = capitalizeWords(clean);
                        setInputNames(prev => prev.trim() ? prev + ', ' + capitalizedClean : capitalizedClean);
                    };
                    recognition.onerror = () => { setIsListening(false); showToast('Lỗi micro!', 'error'); };
                    recognition.onend = () => setIsListening(false);
                    recognitionRef.current = recognition;
                }
            }, []);

            const toggleVoice = () => {
                if (!recognitionRef.current) return showToast('Trình duyệt không hỗ trợ', 'error');
                if (isListening) { recognitionRef.current.stop(); } 
                else { recognitionRef.current.start(); setIsListening(true); showToast('Đang nghe... 🎤'); }
            };

            // --- THÊM KHÁCH ---
            const handleAddGuests = () => {
                const rawGroup = newGroupInput.trim() || inputGroup;
                if (!rawGroup) return showToast("Chọn Nhóm đã nhé!", "error");
                const group = capitalizeWords(rawGroup);
                
                const rawNames = inputNames.split(/[\n,]+/).map(n => n.trim()).filter(n => n);
                if (!rawNames.length) return showToast("Chưa nhập tên!", "error");
                const names = rawNames.map(n => capitalizeWords(n));

                const newG = names.map(name => ({
                    id: crypto.randomUUID ? crypto.randomUUID() : Date.now() + Math.random(),
                    name, group, mainMeals: Number(defaultMainMeals), subMeals: Number(defaultSubMeals),
                    isInvited: false, rsvp: 'pending', createdAt: Date.now()
                }));
                
                setGuests(prev => [...newG, ...prev]);
                setCollapsedGroups(prev => ({...prev, [group]: false})); // Đảm bảo nhóm vừa thêm đang mở
                
                setInputNames(''); 
                if (isListening && recognitionRef.current) recognitionRef.current.stop();
                showToast(`Đã thêm ${names.length} khách!`);
                if(inputRef.current) inputRef.current.focus();
            };

            const handleNameInputChange = (e) => setInputNames(e.target.value);
            const handleKeyDown = (e) => { if (e.key === 'Enter') { e.preventDefault(); handleAddGuests(); } };

            const updateGuest = (id, field, value) => {
                const finalValue = field === 'name' ? capitalizeWords(value) : value;
                setGuests(prev => prev.map(g => g.id === id ? { ...g, [field]: finalValue } : g));
            };

            const deleteGuest = (id) => {
                if (window.confirm("Xóa khách này khỏi danh sách?")) setGuests(prev => prev.filter(g => g.id !== id));
            };

            // --- TƯƠNG TÁC DOUBLE TAP / SINGLE TAP ---
            const handleGuestTap = (guest) => {
                const now = Date.now();
                const DOUBLE_TAP_DELAY = 300; 
                
                if (now - (window.lastTapTime || 0) < DOUBLE_TAP_DELAY) {
                    // Double Tap
                    window.lastTapTime = 0; 
                    const confirmMsg = guest.isInvited 
                        ? `Đã mời "${guest.name}" rồi. Bạn muốn HỦY đánh dấu?` 
                        : `Xác nhận đã gửi thiệp cho "${guest.name}"?`;
                        
                    if (window.confirm(confirmMsg)) {
                        updateGuest(guest.id, 'isInvited', !guest.isInvited);
                        showToast(guest.isInvited ? "Đã hủy đánh dấu" : "Đã đánh dấu Mời!");
                    }
                } else {
                    // Single Tap -> Mở chi tiết
                    window.lastTapTime = now;
                    setExpandedGuestId(prev => prev === guest.id ? null : guest.id);
                }
            };

            const toggleGroup = (groupName) => {
                setCollapsedGroups(prev => ({ ...prev, [groupName]: !prev[groupName] }));
            };

            // --- XUẤT/NHẬP DỮ LIỆU (ĐÃ KHÔI PHỤC) ---
            const exportCSV = () => {
                if(!guests.length) return showToast("Chưa có dữ liệu", "error");
                const headers = ['Tên khách', 'Khu vực', 'Bữa chính', 'Bữa phụ', 'Trạng thái mời', 'Xác nhận đi'];
                const rows = guests.map(g => [ `"${g.name}"`, `"${g.group}"`, g.mainMeals, g.subMeals, g.isInvited ? 'Đã mời' : 'Chưa', g.rsvp === 'yes' ? 'Đi' : g.rsvp === 'no' ? 'Nghỉ' : 'Chờ' ]);
                const csv = "data:text/csv;charset=utf-8,\uFEFF" + [headers, ...rows].map(e => e.join(",")).join("\n");
                const link = document.createElement("a");
                link.href = encodeURI(csv); link.download = `DanhSachKhachMoi_${Date.now()}.csv`;
                link.click();
            };

            const exportJSON = () => {
                if(guests.length === 0) return showToast("Không có dữ liệu", "error");
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(guests));
                const link = document.createElement("a");
                link.href = dataStr; link.download = `Backup_KhachMoi_${Date.now()}.json`;
                link.click();
                showToast("Đã tải file sao lưu!");
            };

            const importJSON = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (Array.isArray(importedData)) {
                            if (window.confirm(`Tìm thấy ${importedData.length} khách. Ghi đè lên dữ liệu hiện tại?`)) {
                                setGuests(importedData);
                                showToast("Phục hồi thành công!");
                            }
                        } else showToast("Sai định dạng", "error");
                    } catch (err) { showToast("Lỗi file", "error"); }
                };
                reader.readAsText(file);
                e.target.value = ''; 
            };

            // --- GIAO DIỆN CÁC TAB ---
            const renderHome = () => {
                const stats = guests.reduce((acc, g) => {
                    acc.total++; acc.main += g.mainMeals; acc.sub += g.subMeals;
                    if (g.isInvited) acc.invited++;
                    if (g.rsvp === 'yes') { acc.yes++; acc.mainYes += g.mainMeals; acc.subYes += g.subMeals; }
                    return acc;
                }, { total:0, main:0, sub:0, invited:0, yes:0, mainYes:0, subYes:0 });

                return (
                    <div className="p-4 pt-safe content-pb animate-fade-in max-w-2xl mx-auto space-y-4">
                        <h1 className="text-2xl font-black text-slate-800 tracking-tight px-2">Tổng quan</h1>
                        
                        <div className="bg-gradient-to-br from-brand-500 to-pink-600 rounded-[2rem] p-6 text-white shadow-float">
                            <p className="text-brand-100 font-bold text-sm mb-1 uppercase tracking-wider">Tiến độ gửi thiệp</p>
                            <div className="flex items-end gap-2 mb-4">
                                <span className="text-6xl font-black">{stats.invited}</span>
                                <span className="text-2xl text-brand-200 font-black mb-1.5">/ {stats.total}</span>
                            </div>
                            <div className="w-full bg-black/20 h-2 rounded-full overflow-hidden">
                                <div className="bg-white h-full transition-all duration-1000 ease-out" style={{ width: `${stats.total ? (stats.invited/stats.total)*100 : 0}%`}}></div>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-white p-5 rounded-[2rem] shadow-soft border border-slate-100 flex flex-col justify-between">
                                <p className="text-slate-500 text-sm font-bold mb-1">Chắc chắn đi</p>
                                <p className="text-4xl font-black text-slate-800">{stats.yes}</p>
                            </div>
                            <div className="bg-white p-5 rounded-[2rem] shadow-soft border border-slate-100 flex flex-col justify-between">
                                <p className="text-slate-500 text-sm font-bold mb-1">Dự kiến Mâm</p>
                                <p className="text-4xl font-black text-slate-800">{stats.main}</p>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderList = () => {
                // Lọc & Sắp xếp
                let filtered = guests.filter(g => {
                    const matchName = g.name.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchGroup = filterGroup === 'all' || g.group === filterGroup;
                    return matchName && matchGroup;
                });

                filtered.sort((a, b) => {
                    if (sortBy === 'name_asc') return a.name.localeCompare(b.name, 'vi');
                    if (sortBy === 'time_asc') return a.createdAt - b.createdAt;
                    return b.createdAt - a.createdAt; // time_desc
                });
                
                const grouped = filtered.reduce((acc, guest) => {
                    if (!acc[guest.group]) acc[guest.group] = [];
                    acc[guest.group].push(guest);
                    return acc;
                }, {});

                return (
                    <div className="p-4 pt-safe content-pb animate-fade-in max-w-2xl mx-auto">
                        <div className="mb-4 sticky top-0 bg-[#f8fafc] z-20 pt-2 pb-3">
                            <h1 className="text-2xl font-black text-slate-800 tracking-tight mb-4 px-2">Danh sách mời</h1>
                            
                            {/* KHÔI PHỤC THANH CÔNG CỤ LỌC & SẮP XẾP */}
                            <div className="flex gap-2 mb-3 px-1">
                                <select 
                                    className="bg-white border border-slate-200 rounded-xl px-3 py-2 outline-none font-bold text-slate-700 shadow-sm flex-1"
                                    value={filterGroup} onChange={e => setFilterGroup(e.target.value)}
                                >
                                    <option value="all">Tất cả Nhóm</option>
                                    {uniqueGroups.map(g => <option key={g} value={g}>{g}</option>)}
                                </select>
                                <select 
                                    className="bg-white border border-slate-200 rounded-xl px-3 py-2 outline-none font-bold text-slate-700 shadow-sm flex-1"
                                    value={sortBy} onChange={e => setSortBy(e.target.value)}
                                >
                                    <option value="time_desc">Mới nhất</option>
                                    <option value="time_asc">Cũ nhất</option>
                                    <option value="name_asc">Tên A-Z</option>
                                </select>
                            </div>

                            {/* TÌM KIẾM */}
                            <div className="relative shadow-sm rounded-2xl bg-white border border-slate-200">
                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"><IconSearch /></div>
                                <input 
                                    type="text" placeholder="Tìm kiếm..." 
                                    className="w-full pl-12 pr-4 py-3.5 bg-transparent outline-none font-bold text-slate-700 placeholder-slate-400 rounded-2xl"
                                    value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>

                        <div className="space-y-4">
                            {Object.keys(grouped).length === 0 ? (
                                <div className="text-center py-10 text-slate-400 font-medium">Chưa có ai</div>
                            ) : Object.entries(grouped).map(([groupName, groupGuests]) => {
                                const isCollapsed = collapsedGroups[groupName];

                                return (
                                    <div key={groupName} className="bg-white rounded-[2rem] shadow-soft border border-slate-100 overflow-hidden">
                                        
                                        <div 
                                            className="flex justify-between items-center px-5 py-4 cursor-pointer active:bg-slate-50 transition-colors bg-white z-10 sticky top-[135px]"
                                            onClick={() => toggleGroup(groupName)}
                                        >
                                            <div className="flex items-center gap-3">
                                                <span className="font-black text-slate-800 text-lg">{groupName}</span>
                                                <span className="font-black text-brand-600 bg-brand-50 px-2.5 py-0.5 rounded-lg text-sm">{groupGuests.length}</span>
                                            </div>
                                            <IconChevron className={`text-slate-400 transition-transform duration-300 ${isCollapsed ? '' : 'rotate-180'}`} />
                                        </div>

                                        {!isCollapsed && (
                                            <div className="px-3 pb-3 space-y-1">
                                                {groupGuests.map(g => {
                                                    const isExpanded = expandedGuestId === g.id;

                                                    return (
                                                        <div key={g.id} className="bg-slate-50 rounded-2xl overflow-hidden transition-all duration-300">
                                                            
                                                            <div 
                                                                className="px-4 py-3.5 flex justify-between items-center cursor-pointer active:bg-slate-100 select-none"
                                                                onClick={() => handleGuestTap(g)}
                                                            >
                                                                <div className="flex items-center gap-2">
                                                                    <span className={`font-black text-[17px] ${g.isInvited ? 'text-slate-500' : 'text-slate-800'}`}>
                                                                        {g.name}
                                                                    </span>
                                                                    {g.isInvited && (
                                                                        <span className="flex items-center gap-1 bg-emerald-100 text-emerald-700 text-[10px] uppercase font-black px-2 py-0.5 rounded-full ml-1">
                                                                            <IconEnvelope/> Đã mời
                                                                        </span>
                                                                    )}
                                                                </div>
                                                                <div className="flex items-center">
                                                                    {g.rsvp === 'yes' && <span className="text-emerald-500 font-bold text-sm">✅ Đi</span>}
                                                                    {g.rsvp === 'no' && <span className="text-red-500 font-bold text-sm">❌ Nghỉ</span>}
                                                                </div>
                                                            </div>

                                                            {/* PHẦN MENU PHỤ (Chạm 1 lần để mở) */}
                                                            {isExpanded && (
                                                                <div className="px-4 pb-4 pt-2 border-t border-slate-200/50 animate-fade-in flex flex-col gap-3">
                                                                    
                                                                    {/* Ô Sửa Tên (ĐÃ KHÔI PHỤC) */}
                                                                    <input 
                                                                        type="text" 
                                                                        value={g.name} 
                                                                        onChange={(e) => updateGuest(g.id, 'name', e.target.value)}
                                                                        className="w-full bg-transparent font-bold text-slate-800 border-b border-slate-200 focus:border-brand-400 outline-none pb-1 capitalize"
                                                                        autoCapitalize="words"
                                                                        placeholder="Tên khách..."
                                                                    />

                                                                    <div className="flex items-center justify-between gap-3">
                                                                        <div className="flex items-center bg-white rounded-xl shadow-sm border border-slate-200 p-1">
                                                                            <span className="text-xs font-bold text-slate-400 pl-2 pr-1">Cỗ:</span>
                                                                            <input 
                                                                                type="number" min="0" 
                                                                                className="w-8 text-center font-black bg-transparent outline-none text-slate-800" 
                                                                                value={g.mainMeals} 
                                                                                onChange={e => updateGuest(g.id, 'mainMeals', Number(e.target.value))} 
                                                                            />
                                                                        </div>

                                                                        <div className="flex bg-slate-100 rounded-xl p-1 gap-1 flex-1">
                                                                            <button onClick={() => updateGuest(g.id, 'rsvp', 'pending')} className={`flex-1 py-2 rounded-lg text-xs font-black transition-all ${g.rsvp === 'pending' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-400'}`}>Chờ</button>
                                                                            <button onClick={() => updateGuest(g.id, 'rsvp', 'yes')} className={`flex-1 py-2 rounded-lg text-xs font-black transition-all ${g.rsvp === 'yes' ? 'bg-emerald-500 text-white shadow-md' : 'text-slate-400'}`}>Đi</button>
                                                                            <button onClick={() => updateGuest(g.id, 'rsvp', 'no')} className={`flex-1 py-2 rounded-lg text-xs font-black transition-all ${g.rsvp === 'no' ? 'bg-red-500 text-white shadow-md' : 'text-slate-400'}`}>Nghỉ</button>
                                                                        </div>

                                                                        <button onClick={() => deleteGuest(g.id)} className="bg-white border border-slate-200 text-red-400 hover:text-red-600 p-2 rounded-xl shadow-sm"><IconTrash/></button>
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        )}
                                    </div>
                                )
                            })}
                        </div>
                        <p className="text-center text-xs font-medium text-slate-400 mt-6 mb-4">Mẹo: Chạm nhanh 2 lần vào tên để đánh dấu Đã Mời</p>
                    </div>
                );
            };

            // KHÔI PHỤC TOÀN BỘ TAB CÀI ĐẶT
            const renderSettings = () => (
                <div className="p-4 pt-safe content-pb animate-fade-in max-w-2xl mx-auto space-y-4">
                    <h1 className="text-2xl font-black text-slate-800 tracking-tight mb-6 px-2">Cài đặt</h1>
                    
                    <div className="bg-white p-5 rounded-[2rem] shadow-soft border border-slate-100 flex items-center justify-between cursor-pointer active:bg-slate-50" onClick={() => window.location.reload(true)}>
                        <h3 className="font-black text-slate-800">Cập nhật / Làm mới App</h3>
                        <div className="bg-orange-50 text-orange-500 p-3 rounded-2xl"><IconRefresh/></div>
                    </div>

                    <div className="bg-white p-5 rounded-[2rem] shadow-soft border border-slate-100 flex items-center justify-between cursor-pointer active:bg-slate-50" onClick={exportCSV}>
                        <div>
                            <h3 className="font-black text-slate-800">Xuất Excel (CSV)</h3>
                            <p className="text-xs font-medium text-slate-500">Tải danh sách để in ấn</p>
                        </div>
                        <div className="bg-emerald-50 text-emerald-600 p-3 rounded-2xl"><IconExcel/></div>
                    </div>

                    <div className="bg-white p-5 rounded-[2rem] shadow-soft border border-slate-100 flex items-center justify-between cursor-pointer active:bg-slate-50" onClick={exportJSON}>
                        <div>
                            <h3 className="font-black text-slate-800">Sao lưu (Backup)</h3>
                            <p className="text-xs font-medium text-slate-500">Lưu file an toàn</p>
                        </div>
                        <div className="bg-blue-50 text-blue-600 p-3 rounded-2xl"><IconDownload/></div>
                    </div>

                    <label className="bg-white p-5 rounded-[2rem] shadow-soft border border-slate-100 flex items-center justify-between cursor-pointer active:bg-slate-50 block">
                        <div>
                            <h3 className="font-black text-slate-800">Nhập dữ liệu (Restore)</h3>
                            <p className="text-xs font-medium text-slate-500">Mở file đã sao lưu</p>
                        </div>
                        <div className="bg-purple-50 text-purple-600 p-3 rounded-2xl">
                            <IconUpload/>
                            <input type="file" accept=".json" className="hidden" onChange={importJSON} />
                        </div>
                    </label>

                    <div className="bg-red-50 p-5 rounded-[2rem] border border-red-100 flex items-center justify-between cursor-pointer mt-8" onClick={() => {
                        if(window.confirm("BẠN CÓ CHẮC CHẮN XÓA TOÀN BỘ DỮ LIỆU?")) { setGuests([]); localStorage.removeItem('wedding_app_final'); showToast("Đã xóa sạch"); }
                    }}>
                        <h3 className="font-black text-red-600">Xóa trắng dữ liệu</h3>
                        <div className="text-red-400 p-2"><IconTrash/></div>
                    </div>
                </div>
            );

            return (
                <div className="relative min-h-screen bg-[#f8fafc] font-sans">
                    {activeTab === 'home' && renderHome()}
                    {activeTab === 'list' && renderList()}
                    {activeTab === 'settings' && renderSettings()}

                    {/* MODAL THÊM KHÁCH */}
                    <div className={`fixed inset-0 z-50 flex items-end justify-center transition-opacity duration-300 ${isAddModalOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`}>
                        <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => setIsAddModalOpen(false)}></div>
                        <div className={`relative bg-white w-full max-w-2xl rounded-t-[2.5rem] shadow-2xl p-5 pb-safe transition-transform duration-300 ${isAddModalOpen ? 'translate-y-0' : 'translate-y-full'}`}>
                            
                            <div className="flex justify-between items-center mb-4 px-1">
                                <h2 className="text-xl font-black text-slate-800">Thêm người</h2>
                                <button onClick={() => setIsAddModalOpen(false)} className="bg-slate-100 p-1.5 rounded-full text-slate-500"><IconX/></button>
                            </div>

                            <div className="space-y-3">
                                {/* Chọn Nhóm */}
                                <div className="flex gap-2">
                                    <select className="bg-slate-50 border border-slate-200 rounded-2xl p-3 outline-none w-1/2 font-black text-slate-700" value={inputGroup} onChange={e => setInputGroup(e.target.value)}>
                                        <option value="">- Chọn Nhóm -</option>
                                        {uniqueGroups.map(g => <option key={g} value={g}>{g}</option>)}
                                    </select>
                                    <input 
                                        type="text" placeholder="Tạo Nhóm..." 
                                        className="bg-slate-50 border border-slate-200 rounded-2xl p-3 outline-none w-1/2 font-black text-slate-700 capitalize" 
                                        autoCapitalize="words" value={newGroupInput} onChange={e => {setNewGroupInput(e.target.value); setInputGroup('');}} 
                                    />
                                </div>

                                {/* Nhập Tên (1 Dòng) & Nút Thêm cố định */}
                                <div className="flex flex-nowrap gap-2 items-stretch">
                                    <div className="relative flex-1">
                                        <input 
                                            ref={inputRef} type="text" autoCapitalize="words"
                                            className={`w-full h-full bg-slate-50 rounded-2xl pl-4 pr-12 outline-none font-bold text-slate-800 text-lg border-2 transition-colors capitalize ${isListening ? 'border-brand-400 bg-brand-50' : 'border-slate-200 focus:border-brand-400'}`}
                                            placeholder="Tên..." value={inputNames} onChange={handleNameInputChange} onKeyDown={handleKeyDown}
                                        />
                                        <button 
                                            type="button" onClick={toggleVoice} 
                                            className={`absolute right-1 top-1/2 -translate-y-1/2 p-2 rounded-full ${isListening ? 'text-brand-500 animate-pulse' : 'text-slate-400'}`}
                                        >
                                            {isListening ? <IconMic /> : <IconMicOff />}
                                        </button>
                                    </div>
                                    <button 
                                        onClick={handleAddGuests} 
                                        className="shrink-0 bg-slate-800 text-white font-black px-5 py-3.5 rounded-2xl active:scale-95 transition-transform"
                                    >
                                        Thêm
                                    </button>
                                </div>

                                {/* KHÔI PHỤC: Cài đặt bữa ăn ở trang Thêm */}
                                <details className="group border border-slate-200 rounded-2xl p-4 cursor-pointer outline-none bg-white">
                                    <summary className="font-bold text-brand-600 text-sm flex justify-between items-center outline-none">
                                        ⚙️ Tùy chỉnh số lượng cỗ mặc định
                                        <span className="text-slate-400 group-open:rotate-180 transition-transform">▼</span>
                                    </summary>
                                    <div className="flex gap-4 mt-4 pt-4 border-t border-slate-100 cursor-default">
                                        <div className="flex-1">
                                            <label className="text-xs text-slate-500 font-bold block mb-1">Cỗ chính</label>
                                            <input type="number" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-black" value={defaultMainMeals} onChange={e => setDefaultMainMeals(e.target.value)} />
                                        </div>
                                        <div className="flex-1">
                                            <label className="text-xs text-slate-500 font-bold block mb-1">Tiệc trà</label>
                                            <input type="number" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-black" value={defaultSubMeals} onChange={e => setDefaultSubMeals(e.target.value)} />
                                        </div>
                                    </div>
                                </details>

                            </div>
                        </div>
                    </div>

                    {/* Toast */}
                    {toast && (
                        <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[60] animate-slide-up">
                            <div className="px-5 py-3 rounded-full shadow-float font-black text-sm text-white bg-slate-800 text-center whitespace-nowrap">
                                {toast.message}
                            </div>
                        </div>
                    )}

                    {/* FAB */}
                    <button 
                        onClick={() => setIsAddModalOpen(true)}
                        className="fixed z-40 bg-brand-500 text-white w-16 h-16 rounded-[1.5rem] shadow-float flex items-center justify-center active:scale-95 transition-transform"
                        style={{ bottom: 'calc(80px + env(safe-area-inset-bottom))', right: '1.5rem' }}
                    >
                        <IconPlus />
                    </button>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-0 left-0 right-0 z-30 glass-nav pb-safe">
                        <div className="flex justify-around items-center h-[70px] max-w-md mx-auto px-4">
                            <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center p-2 transition-colors ${activeTab === 'home' ? 'text-brand-600' : 'text-slate-400'}`}>
                                <IconHome />
                            </button>
                            <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center p-2 transition-colors ${activeTab === 'list' ? 'text-brand-600' : 'text-slate-400'}`}>
                                <IconUsers />
                            </button>
                            <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center p-2 transition-colors ${activeTab === 'settings' ? 'text-brand-600' : 'text-slate-400'}`}>
                                <IconSettings />
                            </button>
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
