<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wedding Guest App Pro Max</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#fff1f2', 100: '#ffe4e6', 200: '#fecdd3', 400: '#fb7185', 500: '#f43f5e', 600: '#e11d48', 800: '#9f1239', 900: '#881337' }
                    },
                    boxShadow: {
                        'soft': '0 8px 30px -10px rgba(0,0,0,0.08)',
                        'float': '0 20px 40px -10px rgba(225,29,72,0.3)',
                        'inner-light': 'inset 0 2px 4px 0 rgba(255, 255, 255, 0.3)',
                    }
                }
            }
        }
    </script>
    
    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #f1f5f9; overscroll-behavior-y: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .pb-safe { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
        .pt-safe { padding-top: max(1rem, env(safe-area-inset-top)); }
        .content-pb { padding-bottom: calc(85px + env(safe-area-inset-bottom)); }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-top: 1px solid rgba(226, 232, 240, 0.8); }
        
        /* Ẩn mũi tên của thẻ details mặc định */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- ICONS ---
        const IconHome = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconUsers = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconSettings = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
        const IconPlus = () => <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconMic = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>;
        const IconMicOff = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="2" y1="2" x2="22" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" y1="19" x2="12" y2="22"/></svg>;
        const IconX = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconTrash = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
        const IconSearch = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconCheck = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconExcel = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></svg>;
        const IconDownload = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const IconUpload = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;

        function App() {
            // --- STATES CHÍNH ---
            const [activeTab, setActiveTab] = useState('list');
            const [guests, setGuests] = useState(() => {
                try {
                    const saved = localStorage.getItem('wedding_app_final');
                    return saved ? JSON.parse(saved) : [];
                } catch { return []; }
            });
            const [toast, setToast] = useState(null);
            
            // --- STATES: MODAL THÊM KHÁCH ---
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [inputGroup, setInputGroup] = useState('');
            const [newGroupInput, setNewGroupInput] = useState('');
            const [inputNames, setInputNames] = useState('');
            // KHÔI PHỤC: Cài đặt bữa ăn mặc định
            const [defaultMainMeals, setDefaultMainMeals] = useState(1);
            const [defaultSubMeals, setDefaultSubMeals] = useState(0);
            
            // --- STATES: GIỌNG NÓI ---
            const [isListening, setIsListening] = useState(false);
            const recognitionRef = useRef(null);

            // --- STATES: TÌM KIẾM & SẮP XẾP ---
            const [searchTerm, setSearchTerm] = useState('');
            const [filterGroup, setFilterGroup] = useState('all');
            const [sortBy, setSortBy] = useState('time_desc'); // Đã khôi phục sắp xếp

            // Lưu LocalStorage mỗi khi đổi
            useEffect(() => {
                localStorage.setItem('wedding_app_final', JSON.stringify(guests));
            }, [guests]);

            const showToast = (message, type = 'success') => {
                setToast({ message, type, id: Date.now() });
                setTimeout(() => setToast(null), 2500);
            };

            const uniqueGroups = useMemo(() => Array.from(new Set(guests.map(g => g.group))).sort(), [guests]);

            // --- GIỌNG NÓI ---
            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    const recognition = new SpeechRecognition();
                    recognition.continuous = true;
                    recognition.lang = 'vi-VN';
                    recognition.onresult = (event) => {
                        const transcript = Array.from(event.results).map(r => r[0].transcript).join('\n');
                        const clean = transcript.split('\n').map(s => s.trim()).filter(s => s).join('\n');
                        setInputNames(prev => prev.trim() ? prev + '\n' + clean : clean);
                    };
                    recognition.onerror = () => { setIsListening(false); showToast('Lỗi micro!', 'error'); };
                    recognition.onend = () => setIsListening(false);
                    recognitionRef.current = recognition;
                }
            }, []);

            const toggleVoice = () => {
                if (!recognitionRef.current) return showToast('Trình duyệt không hỗ trợ giọng nói.', 'error');
                if (isListening) { recognitionRef.current.stop(); } 
                else { recognitionRef.current.start(); setIsListening(true); showToast('Đang nghe... 🎤'); }
            };

            // --- THÊM & CẬP NHẬT ---
            const handleAddGuests = () => {
                const group = newGroupInput.trim() || inputGroup;
                if (!group) return showToast("Vui lòng chọn hoặc nhập Nhóm!", "error");
                const names = inputNames.split('\n').map(n => n.trim()).filter(n => n);
                if (!names.length) return showToast("Chưa nhập tên khách nào!", "error");

                const newG = names.map(name => ({
                    id: crypto.randomUUID ? crypto.randomUUID() : Date.now() + Math.random(),
                    name, 
                    group, 
                    mainMeals: Number(defaultMainMeals), // Sử dụng tùy chọn
                    subMeals: Number(defaultSubMeals), // Sử dụng tùy chọn
                    isInvited: false, 
                    rsvp: 'pending', 
                    createdAt: Date.now()
                }));
                setGuests(prev => [...newG, ...prev]);
                
                // Reset form
                setInputNames(''); setNewGroupInput(''); setIsAddModalOpen(false);
                if (isListening && recognitionRef.current) recognitionRef.current.stop();
                showToast(`Đã thêm ${names.length} khách!`);
                setActiveTab('list');
            };

            const updateGuest = (id, field, value) => {
                setGuests(prev => prev.map(g => g.id === id ? { ...g, [field]: value } : g));
            };

            const deleteGuest = (id) => {
                if (window.confirm("Xóa khách mời này khỏi danh sách?")) setGuests(prev => prev.filter(g => g.id !== id));
            };

            // --- KHÔI PHỤC: XUẤT / NHẬP DỮ LIỆU ---
            const exportCSV = () => {
                if(!guests.length) return showToast("Chưa có dữ liệu", "error");
                const headers = ['Tên khách', 'Khu vực', 'Bữa chính', 'Bữa phụ', 'Trạng thái mời', 'Xác nhận đi'];
                const rows = guests.map(g => [ `"${g.name}"`, `"${g.group}"`, g.mainMeals, g.subMeals, g.isInvited ? 'Đã mời' : 'Chưa', g.rsvp === 'yes' ? 'Đi' : g.rsvp === 'no' ? 'Nghỉ' : 'Chờ' ]);
                const csv = "data:text/csv;charset=utf-8,\uFEFF" + [headers, ...rows].map(e => e.join(",")).join("\n");
                const link = document.createElement("a");
                link.href = encodeURI(csv); link.download = `DanhSachKhachMoi_${Date.now()}.csv`;
                link.click();
            };

            const exportJSON = () => {
                if(guests.length === 0) return showToast("Không có dữ liệu để sao lưu", "error");
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(guests));
                const link = document.createElement("a");
                link.href = dataStr; link.download = `Backup_KhachMoi_${Date.now()}.json`;
                link.click();
                showToast("Đã tải file sao lưu!");
            };

            const importJSON = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (Array.isArray(importedData)) {
                            if (window.confirm(`Tìm thấy ${importedData.length} khách. Bạn có muốn ghi đè lên dữ liệu hiện tại không?`)) {
                                setGuests(importedData);
                                showToast("Phục hồi thành công!");
                            }
                        } else showToast("File không đúng định dạng", "error");
                    } catch (err) { showToast("Lỗi đọc file", "error"); }
                };
                reader.readAsText(file);
                e.target.value = ''; // reset
            };

            // --- THỐNG KÊ ---
            const stats = useMemo(() => {
                return guests.reduce((acc, g) => {
                    acc.total++; acc.main += g.mainMeals; acc.sub += g.subMeals;
                    if (g.isInvited) acc.invited++;
                    if (g.rsvp === 'yes') { acc.yes++; acc.mainYes += g.mainMeals; acc.subYes += g.subMeals; }
                    return acc;
                }, { total:0, main:0, sub:0, invited:0, yes:0, mainYes:0, subYes:0 });
            }, [guests]);

            // --- RENDER GIAO DIỆN ---

            const renderHome = () => (
                <div className="p-4 pt-safe content-pb animate-fade-in max-w-2xl mx-auto space-y-6">
                    <div className="flex justify-between items-center px-2">
                        <div>
                            <h1 className="text-2xl font-black text-slate-800 tracking-tight">Tổng quan</h1>
                            <p className="text-slate-500 text-sm font-medium">Theo dõi tiến độ chuẩn bị 💍</p>
                        </div>
                    </div>

                    <div className="bg-gradient-to-br from-brand-500 to-pink-600 rounded-[2rem] p-6 text-white shadow-float relative overflow-hidden">
                        <div className="relative z-10">
                            <p className="text-brand-100 font-bold text-sm mb-1 uppercase tracking-wider">Tiến độ gửi thiệp</p>
                            <div className="flex items-end gap-2 mb-4">
                                <span className="text-6xl font-black">{stats.invited}</span>
                                <span className="text-2xl text-brand-200 font-black mb-1.5">/ {stats.total}</span>
                            </div>
                            <div className="w-full bg-black/20 h-3 rounded-full overflow-hidden backdrop-blur-sm shadow-inner-light">
                                <div className="bg-white h-full transition-all duration-1000 ease-out rounded-full" style={{ width: `${stats.total ? (stats.invited/stats.total)*100 : 0}%`}}></div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-white p-5 rounded-[2rem] shadow-soft border border-slate-100 flex flex-col justify-between">
                            <div className="w-12 h-12 rounded-2xl bg-emerald-100 text-emerald-600 flex items-center justify-center mb-4">
                                <IconCheck />
                            </div>
                            <div>
                                <p className="text-slate-500 text-sm font-bold mb-1">Chắc chắn đi</p>
                                <p className="text-4xl font-black text-slate-800">{stats.yes}</p>
                            </div>
                        </div>
                        <div className="bg-white p-5 rounded-[2rem] shadow-soft border border-slate-100 flex flex-col justify-between">
                            <div className="w-12 h-12 rounded-2xl bg-amber-100 text-amber-600 flex items-center justify-center mb-4 text-xl font-black">
                                Cỗ
                            </div>
                            <div>
                                <p className="text-slate-500 text-sm font-bold mb-1">Dự kiến Mâm</p>
                                <p className="text-4xl font-black text-slate-800">{stats.main}</p>
                                <p className="text-xs text-emerald-600 font-black mt-2 bg-emerald-50 inline-block px-2 py-1 rounded-md">Chắc chắn: {stats.mainYes}</p>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderList = () => {
                // LỌC VÀ SẮP XẾP TRƯỚC KHI GOM NHÓM
                let filtered = guests.filter(g => {
                    const matchName = g.name.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchGroup = filterGroup === 'all' || g.group === filterGroup;
                    return matchName && matchGroup;
                });

                filtered.sort((a, b) => {
                    if (sortBy === 'name_asc') return a.name.localeCompare(b.name, 'vi');
                    if (sortBy === 'time_asc') return a.createdAt - b.createdAt;
                    return b.createdAt - a.createdAt; // time_desc
                });
                
                // GOM NHÓM
                const grouped = filtered.reduce((acc, guest) => {
                    if (!acc[guest.group]) acc[guest.group] = [];
                    acc[guest.group].push(guest);
                    return acc;
                }, {});

                return (
                    <div className="p-4 pt-safe content-pb animate-fade-in max-w-2xl mx-auto">
                        <div className="mb-4 sticky top-0 bg-[#f1f5f9] z-20 pt-2 pb-3">
                            <h1 className="text-2xl font-black text-slate-800 tracking-tight mb-4 px-2">Danh sách mời</h1>
                            
                            {/* KHÔI PHỤC: Thanh công cụ Lọc & Sắp xếp */}
                            <div className="flex gap-2 mb-3 px-1">
                                <select 
                                    className="bg-white border border-slate-200 rounded-xl px-3 py-2 outline-none font-bold text-slate-700 shadow-sm flex-1"
                                    value={filterGroup} onChange={e => setFilterGroup(e.target.value)}
                                >
                                    <option value="all">Tất cả Nhóm</option>
                                    {uniqueGroups.map(g => <option key={g} value={g}>{g}</option>)}
                                </select>
                                <select 
                                    className="bg-white border border-slate-200 rounded-xl px-3 py-2 outline-none font-bold text-slate-700 shadow-sm flex-1"
                                    value={sortBy} onChange={e => setSortBy(e.target.value)}
                                >
                                    <option value="time_desc">Mới nhất</option>
                                    <option value="time_asc">Cũ nhất</option>
                                    <option value="name_asc">Tên A-Z</option>
                                </select>
                            </div>

                            <div className="relative shadow-sm rounded-2xl bg-white border border-slate-200">
                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                    <IconSearch />
                                </div>
                                <input 
                                    type="text" placeholder="Tìm tên khách..." 
                                    className="w-full pl-12 pr-4 py-3.5 bg-transparent outline-none font-bold text-slate-700 placeholder-slate-400 rounded-2xl"
                                    value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>

                        <div className="space-y-6">
                            {Object.keys(grouped).length === 0 ? (
                                <div className="text-center py-10 text-slate-400 font-medium">Chưa có dữ liệu hoặc không tìm thấy</div>
                            ) : Object.entries(grouped).sort().map(([groupName, groupGuests]) => (
                                <div key={groupName} className="space-y-3">
                                    
                                    {/* STICKY HEADER NHÓM & SỐ LƯỢNG GÓC PHẢI */}
                                    <div className="sticky top-[140px] z-10 flex justify-between items-center bg-white/85 backdrop-blur-md px-4 py-3 rounded-2xl shadow-sm border border-slate-100">
                                        <span className="font-black text-slate-800 text-lg">{groupName}</span>
                                        <span className="font-black text-brand-600 bg-brand-50 px-3 py-1 rounded-xl">{groupGuests.length}</span>
                                    </div>

                                    {/* DANH SÁCH */}
                                    {groupGuests.map(g => (
                                        <div key={g.id} className="bg-white p-4 rounded-3xl shadow-soft border border-slate-100 relative group">
                                            {/* Xóa */}
                                            <button onClick={() => deleteGuest(g.id)} className="absolute top-4 right-4 text-slate-200 hover:text-red-500 transition-colors p-2 -m-2 z-10">
                                                <IconTrash/>
                                            </button>

                                            <input 
                                                type="text" value={g.name} onChange={(e) => updateGuest(g.id, 'name', e.target.value)}
                                                className="font-black text-xl text-slate-800 bg-transparent outline-none w-[85%] border-b border-transparent focus:border-slate-200 mb-4"
                                            />

                                            <div className="flex flex-col gap-3">
                                                <div className="flex justify-between items-center bg-slate-50 p-2 rounded-2xl">
                                                    <label className="flex items-center gap-3 cursor-pointer pl-2">
                                                        <div className="relative">
                                                            <input type="checkbox" className="sr-only" checked={g.isInvited} onChange={e => updateGuest(g.id, 'isInvited', e.target.checked)} />
                                                            <div className={`block w-12 h-7 rounded-full transition-colors duration-300 ${g.isInvited ? 'bg-brand-500 shadow-inner' : 'bg-slate-200'}`}></div>
                                                            <div className={`absolute left-1 top-1 bg-white w-5 h-5 rounded-full transition-transform duration-300 shadow-sm ${g.isInvited ? 'translate-x-5' : ''}`}></div>
                                                        </div>
                                                        <span className={`text-sm font-black ${g.isInvited ? 'text-brand-600' : 'text-slate-400'}`}>Đã gửi thiệp</span>
                                                    </label>

                                                    <div className="flex items-center gap-1 text-sm font-bold bg-white px-2 py-1.5 rounded-xl shadow-sm border border-slate-100">
                                                        <span className="text-amber-600 ml-1">Cỗ:</span>
                                                        <input type="number" min="0" className="w-8 text-center outline-none bg-transparent" value={g.mainMeals} onChange={e => updateGuest(g.id, 'mainMeals', Number(e.target.value))} />
                                                    </div>
                                                </div>

                                                {/* PILL BUTTONS CHO RSVP */}
                                                <div className="flex bg-slate-100 rounded-2xl p-1 gap-1 w-full relative">
                                                    <button 
                                                        onClick={() => updateGuest(g.id, 'rsvp', 'pending')} 
                                                        className={`flex-1 py-2 rounded-xl text-sm font-black transition-all duration-200 ${g.rsvp === 'pending' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}
                                                    >⏳ Chờ</button>
                                                    <button 
                                                        onClick={() => updateGuest(g.id, 'rsvp', 'yes')} 
                                                        className={`flex-1 py-2 rounded-xl text-sm font-black transition-all duration-200 ${g.rsvp === 'yes' ? 'bg-emerald-500 text-white shadow-md' : 'text-slate-400 hover:text-emerald-500'}`}
                                                    >✅ Đi</button>
                                                    <button 
                                                        onClick={() => updateGuest(g.id, 'rsvp', 'no')} 
                                                        className={`flex-1 py-2 rounded-xl text-sm font-black transition-all duration-200 ${g.rsvp === 'no' ? 'bg-red-500 text-white shadow-md' : 'text-slate-400 hover:text-red-500'}`}
                                                    >❌ Nghỉ</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderSettings = () => (
                <div className="p-4 pt-safe content-pb animate-fade-in max-w-2xl mx-auto">
                    <h1 className="text-2xl font-black text-slate-800 tracking-tight mb-6 px-2">Cài đặt & Dữ liệu</h1>
                    
                    <div className="space-y-4">
                        <div className="bg-white p-5 rounded-[2rem] shadow-soft border border-slate-100 flex items-center justify-between cursor-pointer active:scale-95 transition-transform" onClick={exportCSV}>
                            <div>
                                <h3 className="font-black text-slate-800 text-lg">Xuất file Excel</h3>
                                <p className="text-sm text-slate-500 font-medium mt-1">Tải danh sách để in ấn, đối chiếu</p>
                            </div>
                            <div className="bg-emerald-50 text-emerald-600 p-4 rounded-2xl"><IconExcel/></div>
                        </div>

                        {/* KHÔI PHỤC: Backup / Restore */}
                        <div className="bg-white p-5 rounded-[2rem] shadow-soft border border-slate-100 flex items-center justify-between cursor-pointer active:scale-95 transition-transform" onClick={exportJSON}>
                            <div>
                                <h3 className="font-black text-slate-800 text-lg">Sao lưu (Backup)</h3>
                                <p className="text-sm text-slate-500 font-medium mt-1">Tải file .json cất giữ an toàn</p>
                            </div>
                            <div className="bg-blue-50 text-blue-600 p-4 rounded-2xl"><IconDownload/></div>
                        </div>

                        <label className="bg-white p-5 rounded-[2rem] shadow-soft border border-slate-100 flex items-center justify-between cursor-pointer active:scale-95 transition-transform block">
                            <div>
                                <h3 className="font-black text-slate-800 text-lg">Phục hồi (Restore)</h3>
                                <p className="text-sm text-slate-500 font-medium mt-1">Mở file .json đã lưu trước đó</p>
                            </div>
                            <div className="bg-purple-50 text-purple-600 p-4 rounded-2xl">
                                <IconUpload/>
                                <input type="file" accept=".json" className="hidden" onChange={importJSON} />
                            </div>
                        </label>
                        
                        {/* KHÔI PHỤC: Danger Zone */}
                        <div className="mt-8 p-6 rounded-[2rem] border border-red-100 bg-red-50 text-center">
                            <h3 className="font-black text-red-800 mb-2">Vùng Nguy Hiểm</h3>
                            <p className="text-sm text-red-600/80 mb-4 font-medium">Thao tác này sẽ xóa toàn bộ danh sách, hãy sao lưu trước khi thực hiện.</p>
                            <button onClick={() => {
                                if(window.confirm("BẠN CÓ CHẮC CHẮN XÓA TOÀN BỘ? Không thể hoàn tác!")) {
                                    setGuests([]); localStorage.removeItem('wedding_app_final'); showToast("Đã xóa trắng dữ liệu", "success");
                                }
                            }} className="text-white bg-red-600 px-6 py-3 rounded-xl font-bold w-full active:scale-95 transition-transform">Xóa trắng dữ liệu</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="relative min-h-screen bg-[#f1f5f9] font-sans">
                    {/* View */}
                    {activeTab === 'home' && renderHome()}
                    {activeTab === 'list' && renderList()}
                    {activeTab === 'settings' && renderSettings()}

                    {/* Modal Thêm */}
                    <div className={`fixed inset-0 z-50 flex items-end justify-center transition-opacity duration-300 ${isAddModalOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`}>
                        <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => setIsAddModalOpen(false)}></div>
                        <div className={`relative bg-white w-full max-w-2xl rounded-t-[2.5rem] shadow-2xl p-6 pb-safe transition-transform duration-300 max-h-[90vh] overflow-y-auto ${isAddModalOpen ? 'translate-y-0' : 'translate-y-full'}`}>
                            <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-2xl font-black text-slate-800">Thêm khách mời</h2>
                                <button onClick={() => setIsAddModalOpen(false)} className="bg-slate-100 p-2 rounded-full text-slate-500"><IconX/></button>
                            </div>

                            <div className="space-y-5">
                                <div className="grid grid-cols-2 gap-3">
                                    <select className="bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none w-full font-black text-slate-700" value={inputGroup} onChange={e => setInputGroup(e.target.value)}>
                                        <option value="">-- Chọn Đội/Nhóm --</option>
                                        {uniqueGroups.map(g => <option key={g} value={g}>{g}</option>)}
                                    </select>
                                    <input type="text" placeholder="Tạo Nhóm mới..." className="bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none w-full font-black text-slate-700" value={newGroupInput} onChange={e => {setNewGroupInput(e.target.value); setInputGroup('');}} />
                                </div>

                                <div className="relative">
                                    <textarea 
                                        rows="6" 
                                        className={`w-full bg-slate-50 rounded-2xl p-4 pr-16 outline-none resize-none font-bold text-slate-800 text-lg leading-relaxed border-2 transition-colors ${isListening ? 'border-brand-400 bg-brand-50' : 'border-transparent focus:border-slate-200'}`}
                                        placeholder="Nhập tên khách..."
                                        value={inputNames} onChange={e => setInputNames(e.target.value)}
                                    ></textarea>
                                    <button 
                                        type="button" onClick={toggleVoice} 
                                        className={`absolute right-3 top-3 p-3.5 rounded-full shadow-sm transition-all flex items-center justify-center ${isListening ? 'bg-brand-500 text-white animate-pulse' : 'bg-white text-slate-400 hover:text-brand-500'}`}
                                    >
                                        {isListening ? <IconMic /> : <IconMicOff />}
                                    </button>
                                </div>

                                {/* KHÔI PHỤC: Chọn bữa ăn thích thì nhập */}
                                <details className="group border border-slate-200 rounded-2xl p-4 cursor-pointer outline-none bg-white">
                                    <summary className="font-bold text-brand-600 text-sm flex justify-between items-center outline-none">
                                        ⚙️ Tùy chỉnh số lượng cỗ/trà mặc định
                                        <span className="text-slate-400 group-open:rotate-180 transition-transform">▼</span>
                                    </summary>
                                    <div className="flex gap-4 mt-4 pt-4 border-t border-slate-100 cursor-default">
                                        <div className="flex-1">
                                            <label className="text-xs text-slate-500 font-bold block mb-1">Cỗ chính</label>
                                            <input type="number" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-black" value={defaultMainMeals} onChange={e => setDefaultMainMeals(e.target.value)} />
                                        </div>
                                        <div className="flex-1">
                                            <label className="text-xs text-slate-500 font-bold block mb-1">Tiệc trà/phụ</label>
                                            <input type="number" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-center font-black" value={defaultSubMeals} onChange={e => setDefaultSubMeals(e.target.value)} />
                                        </div>
                                    </div>
                                </details>

                                <button onClick={handleAddGuests} className="w-full bg-slate-800 text-white font-black py-4.5 rounded-2xl shadow-xl hover:bg-slate-900 transition-colors mt-2 text-lg h-14">
                                    Lưu ngay
                                </button>
                                <div className="h-4"></div>
                            </div>
                        </div>
                    </div>

                    {/* Toast */}
                    {toast && (
                        <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[60] animate-slide-up">
                            <div className={`px-6 py-3.5 rounded-full shadow-float font-black text-sm text-white flex items-center gap-2 ${toast.type === 'error' ? 'bg-red-500' : 'bg-slate-800'}`}>
                                {toast.type === 'error' ? '⚠️' : '✅'} {toast.message}
                            </div>
                        </div>
                    )}

                    {/* FAB */}
                    <button 
                        onClick={() => setIsAddModalOpen(true)}
                        className="fixed z-40 bg-brand-500 text-white w-16 h-16 rounded-[1.5rem] shadow-float flex items-center justify-center hover:scale-105 active:scale-95 transition-transform"
                        style={{ bottom: 'calc(80px + env(safe-area-inset-bottom))', right: '1.5rem' }}
                    >
                        <IconPlus />
                    </button>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-0 left-0 right-0 z-30 glass-nav pb-safe">
                        <div className="flex justify-around items-center h-[70px] max-w-md mx-auto px-4">
                            <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center p-2 transition-colors ${activeTab === 'home' ? 'text-brand-600' : 'text-slate-400'}`}>
                                <IconHome />
                            </button>
                            <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center p-2 transition-colors ${activeTab === 'list' ? 'text-brand-600' : 'text-slate-400'}`}>
                                <div className="relative">
                                    <IconUsers />
                                    {guests.length > 0 && <span className="absolute -top-1.5 -right-2.5 bg-brand-500 text-white text-[10px] font-black min-w-[20px] h-5 rounded-full flex items-center justify-center border-2 border-white">{guests.length}</span>}
                                </div>
                            </button>
                            <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center p-2 transition-colors ${activeTab === 'settings' ? 'text-brand-600' : 'text-slate-400'}`}>
                                <IconSettings />
                            </button>
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
